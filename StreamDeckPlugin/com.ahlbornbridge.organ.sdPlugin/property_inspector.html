<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>AhlbornBridge</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            color: #ccc;
            background: #2d2d30;
            margin: 0;
            padding: 12px;
        }
        .sdpi-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .sdpi-item-label {
            flex: 0 0 80px;
            text-align: right;
            padding-right: 8px;
            color: #969696;
        }
        select {
            flex: 1;
            background: #3c3c3c;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 4px 6px;
            font-size: 12px;
        }
        select:focus {
            outline: none;
            border-color: #0078d4;
        }
        .info {
            color: #969696;
            font-size: 11px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #444;
        }
    </style>
</head>
<body>
    <div class="sdpi-item" id="organRow">
        <div class="sdpi-item-label">Organ</div>
        <select id="organSelect">
            <option value="0">-- Select organ --</option>
        </select>
    </div>
    <div class="sdpi-item" id="switchRow" style="display:none;">
        <div class="sdpi-item-label">Switch</div>
        <select id="switchSelect">
            <option value="0">-- Select switch --</option>
        </select>
    </div>
    <div class="info" id="status">Waiting for Stream Deck...</div>

    <script>
        var ws = null;
        var piContext = '';
        var piAction = '';
        var currentSettings = {};
        var organSelectEl = document.getElementById('organSelect');
        var switchSelectEl = document.getElementById('switchSelect');
        var organRowEl = document.getElementById('organRow');
        var switchRowEl = document.getElementById('switchRow');
        var statusEl = document.getElementById('status');

        function isSwitchAction() {
            return piAction === 'com.ahlbornbridge.switch';
        }

        function isActiveSensingAction() {
            return piAction === 'com.ahlbornbridge.activesensing';
        }

        function refreshActionLayout() {
            var switchMode = isSwitchAction();
            var activeSensingMode = isActiveSensingAction();
            organRowEl.style.display = (switchMode || activeSensingMode) ? 'none' : 'flex';
            switchRowEl.style.display = switchMode ? 'flex' : 'none';
        }

        function populateOrgans(organs, connected) {
            organSelectEl.innerHTML = '<option value="0">-- Select organ --</option>';
            organs.forEach(function(o) {
                var opt = document.createElement('option');
                opt.value = o.index;
                opt.textContent = o.index + ' - ' + o.name;
                organSelectEl.appendChild(opt);
            });
            if (currentSettings.organIndex) {
                organSelectEl.value = currentSettings.organIndex;
            }
            if (!isSwitchAction() && !isActiveSensingAction()) {
                if (organs.length === 0 && !connected) {
                    statusEl.textContent = 'No organs available. AhlbornBridge not connected!';
                } else {
                    statusEl.textContent = organs.length + ' organs available';
                }
            }
        }

        function populateSwitches(switches, connected) {
            switchSelectEl.innerHTML = '<option value="0">-- Select switch --</option>';
            switches.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s.index;
                opt.textContent = s.index + ' - ' + s.name + ' (ch ' + s.channel + ', cc ' + s.cc + ')';
                switchSelectEl.appendChild(opt);
            });
            if (currentSettings.switchIndex) {
                switchSelectEl.value = currentSettings.switchIndex;
            }
            if (isSwitchAction()) {
                if (switches.length === 0 && !connected) {
                    statusEl.textContent = 'No switches available. AhlbornBridge not connected!';
                } else {
                    statusEl.textContent = switches.length + ' switches available';
                }
            }
        }

        function requestPayloadList() {
            if (!ws || ws.readyState !== 1) return;
            if (isActiveSensingAction()) {
                statusEl.textContent = 'Console Power action: no configuration required';
                return;
            }
            ws.send(JSON.stringify({
                event: 'sendToPlugin',
                context: piContext,
                action: piAction,
                payload: { piEvent: isSwitchAction() ? 'requestSwitches' : 'requestOrgans' }
            }));
        }

        function saveOrganIndex(idx) {
            currentSettings.organIndex = idx;
            var url = 'http://127.0.0.1:28781/set?ctx=' + encodeURIComponent(piContext) + '&organ=' + idx;
            fetch(url).then(function() {
                statusEl.textContent = 'Saved organ #' + idx;
            }).catch(function() {
                new Image().src = url + '&t=' + Date.now();
                statusEl.textContent = 'Saved organ #' + idx;
            });
            if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ event: 'setSettings', context: piContext, payload: { organIndex: idx } }));
                ws.send(JSON.stringify({
                    event: 'sendToPlugin',
                    context: piContext,
                    action: piAction,
                    payload: { piEvent: 'setOrganIndex', organIndex: idx }
                }));
            }
        }

        function saveSwitchIndex(idx) {
            currentSettings.switchIndex = idx;
            var selectedName = '';
            if (idx > 0 && switchSelectEl.selectedIndex >= 0) {
                selectedName = switchSelectEl.options[switchSelectEl.selectedIndex].textContent || '';
                var dash = selectedName.indexOf(' - ');
                if (dash >= 0) {
                    selectedName = selectedName.substring(dash + 3);
                    var meta = selectedName.indexOf(' (ch ');
                    if (meta >= 0) selectedName = selectedName.substring(0, meta);
                }
            }

            var url = 'http://127.0.0.1:28781/set?ctx=' + encodeURIComponent(piContext) + '&switch=' + idx;
            fetch(url).then(function() {
                statusEl.textContent = idx > 0 ? ('Saved switch #' + idx) : 'Switch cleared';
            }).catch(function() {
                new Image().src = url + '&t=' + Date.now();
                statusEl.textContent = idx > 0 ? ('Saved switch #' + idx) : 'Switch cleared';
            });

            if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({
                    event: 'sendToPlugin',
                    context: piContext,
                    action: piAction,
                    payload: { piEvent: 'setSwitchIndex', switchIndex: idx, switchName: selectedName }
                }));
                ws.send(JSON.stringify({ event: 'setSettings', context: piContext, payload: { switchIndex: idx, switchName: selectedName, switchIsOn: false } }));
            }
            currentSettings.switchName = selectedName;
            currentSettings.switchIsOn = false;
        }

        // SD calls this global function with connection parameters
        function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
            var actionInfo = {};
            if (typeof inActionInfo === 'string') {
                try { actionInfo = JSON.parse(inActionInfo); } catch(e) { }
            } else if (typeof inActionInfo === 'object' && inActionInfo !== null) {
                actionInfo = inActionInfo;
            }

            piContext = (actionInfo && actionInfo.context) || '';
            piAction = (actionInfo && actionInfo.action) || '';
            currentSettings = (actionInfo && actionInfo.payload && actionInfo.payload.settings) || {};
            refreshActionLayout();

            if (currentSettings.organIndex) {
                organSelectEl.value = currentSettings.organIndex;
            }
            if (currentSettings.switchIndex) {
                switchSelectEl.value = currentSettings.switchIndex;
            }

            ws = new WebSocket('ws://127.0.0.1:' + inPort);

            ws.onopen = function() {
                ws.send(JSON.stringify({ event: inRegisterEvent, uuid: inPluginUUID }));
                statusEl.textContent = isSwitchAction() ? 'Connected, requesting switches...' : 'Connected, requesting organs...';
                requestPayloadList();
            };

            ws.onmessage = function(evt) {
                var msg = {};
                try { msg = JSON.parse(evt.data); } catch(e) { return; }

                if (msg.event === 'sendToPropertyInspector') {
                    var pl = msg.payload || {};
                    if (pl.organs) populateOrgans(pl.organs, pl.connected);
                    if (pl.switches) populateSwitches(pl.switches, pl.connected);
                }
                else if (msg.event === 'didReceiveSettings') {
                    var s = (msg.payload && msg.payload.settings) || {};
                    if (s.organIndex !== undefined) {
                        currentSettings.organIndex = s.organIndex;
                        organSelectEl.value = s.organIndex;
                    }
                    if (s.switchIndex !== undefined) {
                        currentSettings.switchIndex = s.switchIndex;
                        switchSelectEl.value = s.switchIndex;
                    }
                }
            };

            ws.onclose = function() { statusEl.textContent = 'Disconnected'; };
            ws.onerror = function() { statusEl.textContent = 'Connection error'; };
        }

        organSelectEl.addEventListener('change', function() {
            saveOrganIndex(parseInt(organSelectEl.value) || 0);
        });

        switchSelectEl.addEventListener('change', function() {
            saveSwitchIndex(parseInt(switchSelectEl.value) || 0);
        });
    </script>
</body>
</html>
